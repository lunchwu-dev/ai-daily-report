<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI日报 - 历史报告索引</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: #0f172a;
            min-height: 100vh;
            padding: 20px;
            color: #e2e8f0;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            padding: 60px 20px;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1) 0%, rgba(139, 92, 246, 0.1) 100%);
            border-radius: 24px;
            margin-bottom: 40px;
            border: 1px solid rgba(99, 102, 241, 0.2);
        }
        
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 50%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .header p {
            color: #94a3b8;
            font-size: 1.1rem;
        }
        
        .section-title {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            color: #6366f1;
            padding: 14px 24px;
            border-radius: 10px;
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 25px;
            border: 1px solid rgba(99, 102, 241, 0.3);
        }
        
        .report-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .report-item {
            background: #1e293b;
            border-radius: 12px;
            padding: 20px 25px;
            border: 1px solid rgba(148, 163, 184, 0.1);
            transition: all 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .report-item:hover {
            transform: translateY(-3px);
            border-color: rgba(99, 102, 241, 0.3);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }
        
        .report-date {
            font-size: 1.1rem;
            color: #f1f5f9;
            font-weight: 600;
        }
        
        .report-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #6366f1;
            text-decoration: none;
            font-weight: 600;
            padding: 10px 20px;
            border-radius: 8px;
            background: rgba(99, 102, 241, 0.1);
            transition: all 0.3s;
        }
        
        .report-link:hover {
            background: rgba(99, 102, 241, 0.2);
            color: #a855f7;
        }
        
        .latest-badge {
            background: linear-gradient(135deg, #10b981 0%, #34d399 100%);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-left: 10px;
        }
        
        .footer {
            text-align: center;
            padding: 40px;
            color: #64748b;
            border-top: 1px solid rgba(148, 163, 184, 0.1);
            margin-top: 50px;
        }
        
        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.8rem;
            }
            
            .report-item {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>🤖 AI日报</h1>
            <p>历史报告索引 | Daily AI Report Archive</p>
        </header>

        <div class="section-title">
            📚 历史报告列表
        </div>
        
        <div class="report-list">
            <div class="report-item">
                <div>
                    <span class="report-date">2026年3月2日</span>
                    <span class="latest-badge">最新</span>
                </div>
                <a href="https://0661b823.ai-daily-report-32b.pages.dev" class="report-link" target="_blank">查看报告 →</a>
            </div>
            
            <div class="report-item">
                <div>
                    <span class="report-date">2026年3月2日（历史版本）</span>
                </div>
                <a href="https://62597495.ai-daily-report-2026-03-02.pages.dev" class="report-link" target="_blank">查看报告 →</a>
            </div>
        </div>

        <footer class="footer">
            <p>🤖 AI日报 | 每日精选全球人工智能热点</p>
            <p>本页面由 Cloudflare Pages 托管</p>
        </footer>
    </div>
</body>
</html>
