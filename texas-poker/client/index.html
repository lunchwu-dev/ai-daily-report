<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>德州扑克 - Texas Hold'em</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a472a 0%, #0d3320 50%, #1a472a 100%);
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }
        
        /* Login Screen */
        .login-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .logo {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        
        .subtitle {
            font-size: 18px;
            color: #aaa;
            margin-bottom: 40px;
        }
        
        .input-group {
            width: 100%;
            max-width: 320px;
            margin-bottom: 20px;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #ccc;
        }
        
        .input-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #2d5a3d;
            border-radius: 8px;
            background: rgba(0,0,0,0.3);
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }
        
        .input-group input:focus {
            border-color: #4CAF50;
        }
        
        .btn {
            width: 100%;
            max-width: 320px;
            padding: 14px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 12px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.4);
        }
        
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 2px solid #4CAF50;
        }
        
        .btn-secondary:hover {
            background: rgba(76, 175, 80, 0.2);
        }
        
        /* Lobby Screen */
        .lobby-screen {
            display: none;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .player-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4CAF50, #2196F3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        
        .table-list {
            display: grid;
            gap: 15px;
        }
        
        .table-card {
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .table-card:hover {
            background: rgba(0,0,0,0.4);
            border-color: #4CAF50;
        }
        
        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .table-name {
            font-size: 18px;
            font-weight: 600;
        }
        
        .table-status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            background: rgba(76, 175, 80, 0.2);
            color: #4CAF50;
        }
        
        .table-status.playing {
            background: rgba(255, 152, 0, 0.2);
            color: #FF9800;
        }
        
        .table-info {
            display: flex;
            gap: 20px;
            color: #aaa;
            font-size: 14px;
        }
        
        /* Game Screen */
        .game-screen {
            display: none;
            min-height: 100vh;
            position: relative;
        }
        
        .game-table {
            position: relative;
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .felt {
            background: radial-gradient(ellipse at center, #2d5a3d 0%, #1a472a 70%, #0d3320 100%);
            border-radius: 50%;
            aspect-ratio: 1.6;
            position: relative;
            border: 8px solid #8B4513;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.5), 0 10px 30px rgba(0,0,0,0.5);
        }
        
        /* Community Cards */
        .community-cards {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            gap: 8px;
        }
        
        .card {
            width: 50px;
            height: 70px;
            background: #fff;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        
        .card.red {
            color: #d32f2f;
        }
        
        .card.black {
            color: #333;
        }
        
        .card .suit {
            font-size: 20px;
        }
        
        .card .rank {
            font-size: 16px;
        }
        
        /* Pot */
        .pot {
            position: absolute;
            top: 35%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 18px;
            font-weight: bold;
        }
        
        /* Players */
        .player-seat {
            position: absolute;
            width: 120px;
            text-align: center;
        }
        
        .player-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #666, #333);
            margin: 0 auto 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            border: 3px solid transparent;
        }
        
        .player-seat.active .player-avatar {
            border-color: #FFD700;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }
        
        .player-seat.dealer .player-avatar::after {
            content: 'D';
            position: absolute;
            top: -5px;
            right: -5px;
            width: 20px;
            height: 20px;
            background: #FFD700;
            border-radius: 50%;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
        }
        
        .player-name {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .player-chips {
            font-size: 12px;
            color: #aaa;
        }
        
        .player-bet {
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
        }
        
        /* Action Buttons */
        .action-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.9);
            padding: 20px;
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .action-btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .btn-fold {
            background: #d32f2f;
            color: white;
        }
        
        .btn-check {
            background: #2196F3;
            color: white;
        }
        
        .btn-call {
            background: #FF9800;
            color: white;
        }
        
        .btn-raise {
            background: #4CAF50;
            color: white;
        }
        
        .btn-allin {
            background: linear-gradient(135deg, #d32f2f, #f44336);
            color: white;
        }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: #1a1a2e;
            padding: 30px;
            border-radius: 16px;
            max-width: 400px;
            width: 90%;
        }
        
        .modal-title {
            font-size: 24px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        /* Responsive */
        @media (max-width: 600px) {
            .felt {
                aspect-ratio: 1;
            }
            
            .card {
                width: 35px;
                height: 50px;
            }
            
            .player-seat {
                width: 80px;
            }
            
            .player-avatar {
                width: 40px;
                height: 40px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div class="login-screen" id="loginScreen">
        <div class="logo">♠️ 德州扑克</div>
        <div class="subtitle">Texas Hold'em Poker</div>
        
        <div class="input-group">
            <label>玩家昵称</label>
            <input type="text" id="playerName" placeholder="输入你的昵称" maxlength="12">
        </div>
        
        <button class="btn btn-primary" onclick="createTable()">创建牌桌</button>
        <button class="btn btn-secondary" onclick="showJoinForm()">加入牌桌</button>
    </div>
    
    <!-- Join Form Modal -->
    <div class="modal" id="joinModal">
        <div class="modal-content">
            <div class="modal-title">加入牌桌</div>
            <div class="input-group">
                <label>牌桌ID</label>
                <input type="text" id="tableId" placeholder="输入牌桌ID">
            </div>
            <button class="btn btn-primary" onclick="joinTable()">加入</button>
            <button class="btn btn-secondary" onclick="hideJoinForm()">取消</button>
        </div>
    </div>
    
    <!-- Lobby Screen -->
    <div class="lobby-screen" id="lobbyScreen">
        <div class="header">
            <div>
                <h2>牌桌大厅</h2>
            </div>
            <div class="player-info">
                <div class="avatar" id="lobbyAvatar">?</div>
                <span id="lobbyPlayerName">玩家</span>
            </div>
        </div>
        
        <div class="table-list" id="tableList">
            <!-- Tables will be loaded here -->
        </div>
    </div>
    
    <!-- Game Screen -->
    <div class="game-screen" id="gameScreen">
        <div class="game-table">
            <div class="felt">
                <div class="pot" id="pot">底池: 0</div>
                <div class="community-cards" id="communityCards">
                    <!-- Community cards will be displayed here -->
                </div>
                
                <!-- Player seats will be positioned here -->
                <div id="playerSeats"></div>
            </div>
        </div>
        
        <div class="action-bar" id="actionBar">
            <button class="action-btn btn-fold" onclick="fold()">弃牌</button>
            <button class="action-btn btn-check" onclick="check()">过牌</button>
            <button class="action-btn btn-call" onclick="call()">跟注</button>
            <button class="action-btn btn-raise" onclick="raise()">加注</button>
            <button class="action-btn btn-allin" onclick="allIn()">全押</button>
        </div>
    </div>
    
    <script src="/socket.io/socket.io.js"></script>
    <script src="game.js"></script>
</body>
</html>
