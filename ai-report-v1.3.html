        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif; background: #0f172a; min-height: 100vh; padding: 20px; color: #e2e8f0; }

        .domestic-title { background: linear-gradient(135deg, #1e293b 0%, rgba(239, 68, 68, 0.2) 100%); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); }

        .card-title { font-size: 1.1rem; color: #f1f5f9; margin-bottom: 12px; line-height: 1.5; font-weight: 600; }
        .card-summary { color: #94a3b8; line-height: 1.7; font-size: 0.95rem; margin-bottom: 15px; }
        .card-link { color: #6366f1; text-decoration: none; font-weight: 500; font-size: 0.9rem; }
        .card-link:hover { color: #a855f7; }
